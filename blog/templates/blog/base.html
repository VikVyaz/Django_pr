<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">

</head>
<body style="padding-top: 70px;">
<div class="fixed-top d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">Блог</h5>
    <nav class="ms-5">
        <a class="p-2 btn btn-outline-primary" href="/blog/">Публикации</a>
    </nav>
</div>

{% block content_header %}{% endblock %}

<div class="container">

    {% block content %}{% endblock %}

    <footer class="pt-4 my-md-5 pt-md-5 border-top">
        <div class="row">
            <div class="col-12 col-md">
                Блог
                <small class="d-block mb-3 text-muted">&copy; 2023</small>
            </div>
            <div class="col-6 col-md">
                <h5>Категории</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="#">?</a></li>
                    <li><a class="text-muted" href="#">?</a></li>
                    <li><a class="text-muted" href="#">?</a></li>
                    <li><a class="text-muted" href="#">?</a></li>
                    <li><a class="text-muted" href="#">?</a></li>
                </ul>
            </div>
            <div class="col-6 col-md">
                <h5>Дополнительно</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="#">?</a></li>
                </ul>
            </div>
            <div class="col-6 col-md">
                <h5>О нас</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="#">?</a></li>
                </ul>
            </div>
        </div>
    </footer>
</div>

<script type="text/javascript" src="/static/js/bootstrap.bundle.min.js"></script>

</body>
</html>
