{% extends 'catalog/base.html' %}

{% block title %}{{ product.name }}{% endblock %} %}

{% block content_header %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">{{ product.name }}</h1>
</div>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-4"></div>
    <div class="col-4">
        <ul class="list-group">
            <li class="list-group-item"><img class="img-thumbnail" src="{{ product.image.url }}"></li>
            <li class="list-group-item fw-bold fs-2">{{ product.price }}$</li>
            <li class="list-group-item">Описание: {{ product.description }}</li>
            <li class="list-group-item">Категория: {{ product.category.name }}</li>
        </ul>
    </div>
    <div class="col-4"></div>
</div>
{% endblock %}
